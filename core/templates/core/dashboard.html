<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>County Health Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .header { background-color: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .stats-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; text-align: center; border-top: 5px solid #3498db; }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; }
        .card .number { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .btn-admin { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px; }
        .btn-admin:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏥 County Health System</h1>
        <p>Hospital Overview Dashboard</p>
    </div>

    <div class="stats-container">
        <div class="card">
            <h3>Total Patients</h3>
            <div class="number">{{ patient_count }}</div>
        </div>

        <div class="card" style="border-top-color: #e74c3c;">
            <h3>Medical Staff</h3>
            <div class="number">{{ doctor_count }}</div>
        </div>

        <div class="card" style="border-top-color: #2ecc71;">
            <h3>Active Appointments</h3>
            <div class="number">{{ appointment_count }}</div>
        </div>
    </div>

    <div style="text-align: center;">
        <a href="/admin" class="btn-admin">Go to Admin Panel</a>
    </div>

</body>
</html>
