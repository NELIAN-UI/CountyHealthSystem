<body style="background: linear-gradient(135deg, #1e3a8a 0%, #0d47a1 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif;">
    <div style="background: white; padding: 40px; border-radius: 15px; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center;">
        <h2 style="color: #0d47a1;">Patient Login</h2>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 15px;">
                <input type="text" name="username" placeholder="Name/Number" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <input type="password" name="password" placeholder="Password" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <button type="submit" style="background: #1976d2; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;">ENTER</button>
        </form>
        <p style="font-size: 12px; color: #666; margin-top: 15px;">Don't have an account? <a href="/register/" style="color: #0d47a1;">Create one</a></p>
    </div>
</body>
