<body style="background: linear-gradient(135deg, #1e3a8a 0%, #0d47a1 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; padding: 20px;">
    <div style="background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
        <h2 style="color: #0d47a1; text-align: center;">Create Account</h2>
        <form method="POST" id="regForm">
            {% csrf_token %}
            <input type="text" name="first_name" placeholder="First Name" required style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px;">
            <input type="text" name="last_name" placeholder="Last Name" required style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px;">
            <input type="date" name="dob" required style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px;">
            <select name="gender" style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px;">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <input type="tel" name="phone" placeholder="Phone Number" required style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px;">
            <input type="text" name="address" placeholder="Physical Address" required style="width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px;">

            <button type="submit" style="background: #1976d2; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;">FINISH & JOIN</button>
        </form>
    </div>
<script>
document.getElementById('regForm').onsubmit = function(e) {
    e.preventDefault(); // Stop the form for a second
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                // User allowed location! Now send the form
                this.submit();
            },
            (error) => {
                // User denied or error, we still let them join
                alert("Location helps us find your nearest hospital, but we'll continue without it.");
                this.submit();
            }
        );
    } else {
        this.submit(); // Browser doesn't support geo, just join
    }
};
</script>
